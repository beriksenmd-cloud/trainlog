}

function deleteExercise(id) {
  if (!confirm('Delete this exercise?')) return;
  state.exercises = state.exercises.filter(e => e.id !== id);
  save();
  closeModal();
  renderLibrary();
}

function showAddExerciseModal(editId) {
  const muscleCheckboxes = MUSCLE_GROUPS.map(m =>
    `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;">
      <input type="checkbox" name="primary" value="${m}"> ${m}
    </label>`
  ).join('');

  const html = `
    <div style="font-size:16px;font-weight:600;margin-bottom:14px;">Add Exercise</div>
    <div class="label">Exercise Name</div>
    <input type="text" id="new-ex-name" placeholder="e.g. Bulgarian Split Squat" style="margin-bottom:10px;">
    <div class="label">Equipment</div>
    <select id="new-ex-equip" style="margin-bottom:10px;">
      ${EQUIPMENT_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}
    </select>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="autofillExercise()">AI Auto-fill Muscles</button>
      <button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveNewExercise()">Save Exercise</button>
    </div>
    <div id="autofill-result" style="margin-top:10px;"></div>`;

    if (editId) {
    const _exData = getExercise(editId);
    if (_exData) {
      setTimeout(() => {
        const nameEl = document.getElementById('new-ex-name');
        const eqEl = document.getElementById('new-ex-equipment');
        const primEl = document.getElementById('new-ex-primary');
        const secEl = document.getElementById('new-ex-secondary');
        const notesEl = document.getElementById('new-ex-notes');
        if (nameEl) nameEl.value = _exData.name;
        if (eqEl) eqEl.value = _exData.equipment;
        if (primEl) primEl.value = (_exData.primary || []).join(', ');
        if (secEl) secEl.value = (_exData.secondary || []).join(', ');
        if (notesEl) notesEl.value = _exData.notes || '';
        window._editingExId = editId;
      }, 50);
    }
  } else {
    window._editingExId = null;
  }
  openModal(html);
}

async function autofillExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const equip = document.getElementById('new-ex-equip').value;
  if (!name) { showToast('Enter exercise name first'); return; }

  document.getElementById('autofill-result').innerHTML = '<div style="color:var(--muted);font-size:14px;">Analyzing...</div>';

  const prompt = `For the exercise "${name}" (equipment: ${equip}), return ONLY a JSON object with this exact structure, no other text:
{"primary":["muscle1","muscle2"],"secondary":["muscle3"],"notes":"brief coaching cue"}

Use ONLY these muscle group names: ${MUSCLE_GROUPS.join(', ')}
Keep notes under 80 characters.`;

  const reply = await callClaude([{ role:'user', content:prompt }]);

  try {
    const clean = reply.replace(/```json?|```/g,'').trim();
    const parsed = JSON.parse(clean);
    window._pendingExerciseMuscles = parsed;

    document.getElementById('autofill-result').innerHTML = `
      <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-top:4px;">
        <div class="label">Primary</div>
        <div class="chip-row">${(parsed.primary||[]).map(m=>`<span class="muscle-chip" style="background:#0d1a0d;color:#4a9a4a;border-color:#1a3a1a;">${m}</span>`).join('')}</div>
        <div class="label" style="margin-top:8px;">Secondary</div>
        <div class="chip-row">${(parsed.secondary||[]).map(m=>`<span class="muscle-chip">${m}</span>`).join('')}</div>
        <div class="label" style="margin-top:8px;">Notes</div>
        <div style="font-size:13px;color:var(--label);">${parsed.notes||''}</div>
      </div>`;
  } catch {
    document.getElementById('autofill-result').innerHTML = '<div style="color:var(--warn);font-size:13px;">Could not parse — try again</div>';
  }
}

function saveNewExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const equip = document.getElementById('new-ex-equip').value;
  if (!name) { showToast('Enter a name'); return; }

  const muscles = window._pendingExerciseMuscles || { primary:[], secondary:[], notes:'' };
  const ex = {
    id: 'e' + uid(),
    name,
    equipment: equip,
    primary: muscles.primary || [],
    secondary: muscles.secondary || [],
    notes: muscles.notes || ''
  };

    if (window._editingExId) {
    const _idx = state.exercises.findIndex(e => e.id === window._editingExId);
    if (_idx > -1) {
      state.exercises[_idx] = { ...state.exercises[_idx], ...newEx, id: window._editingExId };
      save();
      closeModal();
      showToast('Exercise updated!');
      if (document.getElementById('screen-library') && document.getElementById('screen-library').style.display !== 'none') renderLibrary();
      window._editingExId = null;
      return;
    }
  }
  state.exercises.push(ex);
  save();
  window._pendingExerciseMuscles = null;
  closeModal();
  renderLibrary();
  showToast(`${name} added to library`);
}

// ─── PLAN ─────────────────────────────────────────────────────────────────────

function renderPlan() {
  const plan = getActivePlan();
  let html = '';

  // All plans list with swap
  if (state.plans.length > 1) {
    html += `<div class="section-title" style="margin-bottom:8px;">Your Plans</div>`;
    state.plans.forEach(p => {
      const isActive = p.id === state.activePlanId;
      html += `<div class="card" style="margin-bottom:8px;${isActive?'border-color:var(--accent)':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:600;font-size:14px;">${p.name} ${isActive?'<span style="color:var(--accent);font-size:11px;">● ACTIVE</span>':''}</div>
            <div style="font-size:12px;color:var(--muted);">${p.minicycleSize}-session minicycle</div>
          </div>
          <div style="display:flex;gap:6px;">
            ${!isActive ? `<button class="btn btn-sm btn-primary" onclick="switchActivePlan('${p.id}')">Use</button>` : ''}
            <button class="btn btn-sm btn-secondary" onclick="startPlanBuilder('${p.id}')">Edit</button>
            ${!isActive ? `<button class="btn btn-sm" style="background:var(--warn);color:#fff;" onclick="deletePlan('${p.id}')">Del</button>` : ''}
          </div>
        </div>
      </div>`;
    });
  } else {
    html += `<div class="card card-accent-accent">
      <div class="label">Active Plan</div>
      <div style="font-size:17px;font-weight:600;">${plan.name}</div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="font-size:13px;color:var(--muted);">${plan.minicycleSize}-session minicycle</div>
        <button class="btn btn-sm btn-secondary" onclick="startPlanBuilder('${plan.id}')">Edit</button>
      </div>
    </div>`;
  }

  html += `<div class="section-title">Muscle frequency this plan</div>`;

  const freq = {};
  plan.sessions.forEach(sess => {
    sess.exercises.forEach(ex => {
      const exData = getExercise(ex.exerciseId);
      if (!exData) return;
      exData.primary.forEach(m => freq[m] = (freq[m]||0) + 1);
    });
  });

  const maxF = Math.max(...Object.values(freq),1);
  html += Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(([m,f])=>
    `<div class="chart-bar-group">
      <div class="chart-bar-label"><span>${m}</span><span>${f}×/cycle</span></div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(f/maxF*100)}%"></div></div>
    </div>`
  ).join('');

  html += `<div class="card" style="margin-top:20px;border-color:var(--accent)"><div class="card-title">Data Backup &amp; Restore<\/div><p style="color:var(--muted);font-size:13px;margin:8px 0 14px">Save your workout history as a file to prevent data loss.<\/p><button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="exportBackup()">&#8659; Export Backup<\/button><label style="display:block;width:100%;text-align:center;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:15px;font-weight:500">&#8657; Import Backup<input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])"><\/label><\/div>`;
  document.getElementById('plan-body').innerHTML = html;
}

function showNewPlanModal() {
  openModal(`
    <div style="padding:16px">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px;">New Workout Plan</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Create a custom plan or let AI build one</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-primary btn-full" onclick="closeModal();startPlanBuilder()">✏️ Build it myself</button>
        <button class="btn btn-secondary btn-full" onclick="closeModal();showAIPlanBuilder()">✨ AI plan recommendation</button>
      </div>
    </div>
  `);
}

function startPlanBuilder(editPlanId) {
  const editing = editPlanId ? state.plans.find(p=>p.id===editPlanId) : null;
  const plan = editing ? JSON.parse(JSON.stringify(editing)) : {
    id: uid(), name: '', minicycleSize: 4,
    sessions: [
      { key:'A', name:'Session A', focus:'', color:'#c8f135', warmup:[], exercises:[] },
      { key:'B', name:'Session B', focus:'', color:'#6eaecf', warmup:[], exercises:[] },
      { key:'C', name:'Session C', focus:'', color:'#f1a035', warmup:[], exercises:[] },
      { key:'D', name:'Session D', focus:'', color:'#cf6ecf', warmup:[], exercises:[] },
    ]
  };
  window._buildingPlan = plan;
  renderPlanBuilder();
  showScreen('screen-plan-builder');
}

function renderPlanBuilder() {
  const plan = window._buildingPlan;
  // Compute muscle frequency
  const freq = {};
  plan.sessions.forEach(sess => {
    sess.exercises.forEach(ex => {
      const exData = getExercise(ex.exerciseId);
      if (!exData) return;
      exData.primary.forEach(m => freq[m] = (freq[m]||0) + 1);
    });
  });
  const freqHtml = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([m,f]) =>
    `<span style="display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:12px;margin:2px;">${m} ${f}×</span>`
  ).join('');

  let html = `<div style="padding:16px;">
    <div class="label" style="margin-bottom:6px">Plan Name</div>
    <input type="text" id="pb-name" value="${plan.name}" placeholder="e.g. My Push/Pull/Legs" style="width:100%;margin-bottom:16px;" oninput="window._buildingPlan.name=this.value">
    <div class="label" style="margin-bottom:6px">Sessions per minicycle</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      ${[3,4,5].map(n=>`<button class="btn ${plan.minicycleSize===n?'btn-primary':'btn-secondary'}" style="flex:1" onclick="window._buildingPlan.minicycleSize=${n};renderPlanBuilder()">${n}</button>`).join('')}
    </div>
    ${freqHtml ? `<div style="margin-bottom:16px;"><div class="label" style="margin-bottom:6px">Muscle frequency this plan</div><div>${freqHtml}</div></div>` : ''}
    <div class="section-title">Sessions</div>`;

  plan.sessions.slice(0, plan.minicycleSize).forEach((sess, si) => {
    html += `<div class="card" style="margin-bottom:10px;">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <div style="width:4px;border-radius:2px;background:${sess.color};flex-shrink:0;"></div>
        <div style="flex:1;">
          <input type="text" value="${sess.focus}" placeholder="Session ${sess.key} focus (e.g. Push — Chest, Delts)" style="width:100%;font-size:13px;" oninput="window._buildingPlan.sessions[${si}].focus=this.value">
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Session ${sess.key} · ${sess.exercises.length} exercises</div>
      <div id="pb-ex-list-${si}">${sess.exercises.map((ex,ei)=>{
        const exData = getExercise(ex.exerciseId);
        return exData ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span>${exData.name}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="color:var(--muted);">${ex.targetSets}×${ex.targetReps}</span>
            <button onclick="removePlanExercise(${si},${ei})" style="background:none;border:none;color:var(--warn);font-size:16px;cursor:pointer;padding:0 4px;">×</button>
          </div>
        </div>` : '';
      }).join('')}</div>
      <button class="btn btn-secondary" style="width:100%;margin-top:10px;font-size:13px;" onclick="addPlanExercise(${si})">+ Add Exercise</button>
    </div>`;
  });

  html += `<div style="display:flex;gap:10px;margin-top:16px;padding-bottom:40px;">
    <button class="btn btn-secondary" style="flex:1" onclick="showScreen('screen-plan')">Cancel</button>
    <button class="btn btn-primary" style="flex:1" onclick="savePlanBuilder()">Save Plan</button>
  </div></div>`;

  document.getElementById('plan-builder-body').innerHTML = html;
}

function removePlanExercise(sessIdx, exIdx) {
  window._buildingPlan.sessions[sessIdx].exercises.splice(exIdx, 1);
  renderPlanBuilder();
}

function addPlanExercise(sessIdx) {
  window._pbTargetSession = sessIdx;
  // Reuse exercise picker in a special mode
  openModal(`<div style="padding:16px">
    <div style="font-size:16px;font-weight:600;margin-bottom:12px">Add Exercise to Session ${window._buildingPlan.sessions[sessIdx].key}</div>
    <input type="text" id="pb-search" placeholder="Search exercises..." style="width:100%;margin-bottom:10px;" oninput="renderPBPickerResults(this.value)">
    <div id="pb-picker-results">${renderPBPickerHTML('')}</div>
  </div>`);
}

function renderPBPickerHTML(q) {
  const matches = state.exercises.filter(e => !q || e.name.toLowerCase().includes(q.toLowerCase())).slice(0,20);
  return matches.map(e => `<div onclick="selectPBExercise('${e.id}')" style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;">
    <div style="font-weight:500;font-size:14px;">${e.name}</div>
    <div style="font-size:11px;color:var(--muted);">${e.primary.join(', ')}</div>
  </div>`).join('') || '<div style="color:var(--muted);padding:12px 0;">No matches</div>';
}

function renderPBPickerResults(q) {
  document.getElementById('pb-picker-results').innerHTML = renderPBPickerHTML(q);
}

function selectPBExercise(exId) {
  const si = window._pbTargetSession;
  window._buildingPlan.sessions[si].exercises.push({
    exerciseId: exId, targetSets: 3, targetReps: '10-12', targetRIR: '2-3'
  });
  closeModal();
  renderPlanBuilder();
}

function savePlanBuilder() {
  const plan = window._buildingPlan;
  if (!plan.name.trim()) { showToast('Give your plan a name first'); return; }
  const existing = state.plans.find(p=>p.id===plan.id);
  if (existing) {
    Object.assign(existing, plan);
  } else {
    state.plans.push(plan);
  }
  state.activePlanId = plan.id;
  save();
  showToast('Plan saved!');
  showScreen('screen-plan');
  renderPlan();
}

function showAIPlanBuilder() {
  openModal(`<div style="padding:16px">
    <div style="font-size:17px;font-weight:700;margin-bottom:8px;">AI Plan Recommendation</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Describe your goals and any focus areas for this mesocycle. The AI will generate a full plan you can edit.</div>
    <textarea id="ai-plan-goals" rows="4" style="width:100%;margin-bottom:12px;" placeholder="e.g. Focus on hypertrophy, keep volume moderate, prioritize legs and back, avoid anything aggravating my shoulder..."></textarea>
    <button class="btn btn-primary btn-full" onclick="requestAIPlan()">Generate Plan</button>
  </div>`);
}

async function requestAIPlan() {
  const goals = document.getElementById('ai-plan-goals').value.trim() || 'General hypertrophy, balanced plan';
  document.getElementById('modal-content').innerHTML = `<div style="padding:32px;text-align:center;"><div style="font-size:24px;margin-bottom:12px;">✨</div><div style="color:var(--muted);">Building your plan...</div></div>`;

  const injCtx = buildInjuryContext();
  const exList = state.exercises.slice(0,40).map(e=>`${e.id}:${e.name}(${e.primary.join(',')})`).join(';');

  const prompt = `You are a strength training coach. Create a 4-session workout plan (A/B/C/D) for this athlete.

Goals: ${goals}
Available exercises (id:name:primary_muscles): ${exList}

Constraints: ${injCtx}

Return ONLY valid JSON in this exact format, no other text:
{
  "name": "Plan name",
  "sessions": [
    { "key":"A", "focus":"Session A focus", "exercises": [{"exerciseId":"e1","targetSets":4,"targetReps":"10-12","targetRIR":"2-3"}] },
    { "key":"B", "focus":"Session B focus", "exercises": [] },
    { "key":"C", "focus":"Session C focus", "exercises": [] },
    { "key":"D", "focus":"Session D focus", "exercises": [] }
  ]
}`;

  try {
    const response = await callClaude([{role:'user',content:prompt}], '');
    // Parse the JSON from response
    const jsonMatch = response.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');
    const planData = JSON.parse(jsonMatch[0]);

    const newPlan = {
      id: uid(),
      name: planData.name || 'AI Generated Plan',
      minicycleSize: 4,
      sessions: ['A','B','C','D'].map((key,i) => {
        const s = planData.sessions.find(ps=>ps.key===key) || {focus:'',exercises:[]};
        const colors = ['#c8f135','#6eaecf','#f1a035','#cf6ecf'];
        return { key, name:'Session '+key, focus:s.focus||'', color:colors[i], warmup:[], exercises:(s.exercises||[]) };
      })
    };
    closeModal();
    window._buildingPlan = newPlan;
    renderPlanBuilder();
    showScreen('screen-plan-builder');
  } catch(e) {
    document.getElementById('modal-content').innerHTML = `<div style="padding:16px"><div style="color:var(--warn);margin-bottom:12px;">Failed to generate plan: ${e.message}</div><button class="btn btn-secondary btn-full" onclick="closeModal()">Close</button></div>`;
  }
}

function switchActivePlan(planId) {
  state.activePlanId = planId;
  save();
  renderPlan();
  showToast('Plan switched!');
}

function deletePlan(planId) {
  if (state.plans.length <= 1) { showToast('Cannot delete the only plan'); return; }
  if (!confirm('Delete this plan?')) return;
  state.plans = state.plans.filter(p=>p.id!==planId);
  if (state.activePlanId === planId) state.activePlanId = state.plans[0].id;
  save();
  renderPlan();
}

// ─── INSTANT WORKOUT ─────────────────────────────────────────────────────────

function showInstantWorkout() {
  const muscleOptions = MUSCLE_GROUPS.map(m =>
    `<label style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;border-bottom:1px solid var(--border);">
      <input type="checkbox" value="${m}"> ${m}
    </label>`
  ).join('');

  const html = `
    <div style="font-size:16px;font-weight:600;margin-bottom:12px;">Instant Workout</div>
    <div class="label">Target Muscle Groups</div>
    <div style="max-height:240px;overflow-y:auto;margin-bottom:12px;">${muscleOptions}</div>
    <button class="btn btn-primary btn-full" onclick="buildInstantWorkout()">Build Workout →</button>`;

  openModal(html);
}

function buildInstantWorkout() {
  const checked = [...document.querySelectorAll('#modal-content input[type=checkbox]:checked')].map(c => c.value);
  if (!checked.length) { showToast('Select at least one muscle group'); return; }

  const matching = state.exercises.filter(e =>
    e.primary.some(m => checked.includes(m))
  );

  if (!matching.length) { showToast('No exercises found for selected muscles'); return; }

  closeModal();

  currentLog = {
    id: uid(),
    sessionKey: 'INSTANT',
    sessionName: 'Instant Workout',
    sessionFocus: checked.join(', '),
    date: new Date().toISOString(),
    warmupChecked: {},
    warmupSkipped: true,
    exercises: matching.slice(0,8).map(exData => ({
      exerciseId: exData.id,
      name: exData.name,
      targetSets: 3,
      targetReps: '10-12',
      targetRIR: '2-3',
      suggestedWeight: null,
      suggestedReps: '10',
      skipped: false,
      sets: [{ weight:'', reps:'10', rir:'2' }]
    })),
    notes: '',
    customExercises: []
  };

  renderLog();
  showScreen('screen-log');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

load();
renderHome();
setTimeout(checkResumeDraft, 400);

document.getElementById('screen-plan').addEventListener('transitionend', renderPlan);
document.querySelector('[onclick="showScreen(\'screen-plan\')"]').addEventListener('click', () => {
  setTimeout(renderPlan, 50);
});


// ─── INJURY PROFILE ───────────────────────────────────────────────────────────

function showInjuryProfile() {
  renderInjuryProfile();
  showScreen('screen-injury');
}

function renderInjuryProfile() {
  const injuries = state.injuryProfile || [];
  let html = '<div style="padding:16px;">';
  html += '<div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Your diagnoses are used by the AI coach to tailor programming and flag risks.</div>';

  if (!injuries.length) {
    html += '<div style="text-align:center;padding:24px;color:var(--muted);">No diagnoses added yet</div>';
  } else {
    injuries.forEach((inj, i) => {
      const sColor = inj.severity==='permanent'?'var(--warn)':inj.severity==='active'?'#f1a035':'var(--green)';
      html += '<div class="card" style="margin-bottom:10px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
        '<div style="flex:1;">' +
        '<div style="font-weight:600;font-size:14px;">' + inj.diagnosis + '</div>' +
        (inj.notes ? '<div style="font-size:12px;color:var(--muted);margin-top:4px;">' + inj.notes + '</div>' : '') +
        '<span style="display:inline-block;margin-top:6px;padding:2px 8px;border-radius:10px;font-size:11px;background:' + sColor + ';color:var(--bg)">' + inj.severity + '</span>' +
        '</div>' +
        '<button onclick="removeInjury(' + i + ')" style="background:none;border:none;color:var(--warn);font-size:18px;cursor:pointer;padding:0 4px;">×</button>' +
        '</div></div>';
    });
  }

  html += '<button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="showAddInjuryModal()">+ Add Diagnosis</button></div>';
  document.getElementById('injury-body').innerHTML = html;
}

function showAddInjuryModal() {
  openModal('<div style="padding:16px;">' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:12px;">Add Diagnosis</div>' +
    '<div class="label" style="margin-bottom:4px;">Diagnosis / Condition</div>' +
    '<input type="text" id="inj-diagnosis" placeholder="e.g. Greater Trochanteric Pain Syndrome" style="width:100%;margin-bottom:12px;">' +
    '<div class="label" style="margin-bottom:4px;">Notes / Restrictions</div>' +
    '<textarea id="inj-notes" rows="3" style="width:100%;margin-bottom:12px;" placeholder="e.g. No overhead pressing, avoid deep hip flexion under load..."></textarea>' +
    '<div class="label" style="margin-bottom:8px;">Status</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:16px;">' +
    '<button id="sev-permanent" class="btn btn-sm btn-secondary" onclick="setInjSeverity(&#39;permanent&#39;)" style="flex:1;">Permanent</button>' +
    '<button id="sev-active" class="btn btn-sm btn-secondary" onclick="setInjSeverity(&#39;active&#39;)" style="flex:1;">Active</button>' +
    '<button id="sev-resolved" class="btn btn-sm btn-secondary" onclick="setInjSeverity(&#39;resolved&#39;)" style="flex:1;">Resolved</button>' +
    '</div>' +
    '<button class="btn btn-primary btn-full" onclick="saveInjury()">Save</button>' +
    '</div>');
  window._injSeverity = 'active';
  setInjSeverity('active');
}

function setInjSeverity(s) {
  window._injSeverity = s;
  ['permanent','active','resolved'].forEach(function(v) {
    const btn = document.getElementById('sev-'+v);
    if(btn) btn.className = 'btn btn-sm ' + (v===s ? 'btn-primary' : 'btn-secondary');
  });
}

function saveInjury() {
  const diagnosis = (document.getElementById('inj-diagnosis').value||'').trim();
  if (!diagnosis) { showToast('Enter a diagnosis'); return; }
  if (!state.injuryProfile) state.injuryProfile = [];
  state.injuryProfile.push({
    diagnosis: diagnosis,
    notes: (document.getElementById('inj-notes').value||'').trim(),
    severity: window._injSeverity || 'active',
    added: new Date().toISOString()
  });
  save();
  closeModal();
  renderInjuryProfile();
  showToast('Diagnosis saved');
}

function removeInjury(idx) {
  if (!confirm('Remove this diagnosis?')) return;
  state.injuryProfile.splice(idx, 1);
  save();
  renderInjuryProfile();
}

// ─── MESOCYCLE TRANSITION ────────────────────────────────────────────────────

function checkMesoTransition() {
  const plan = getActivePlan();
  const minicyclesDone = Math.floor(state.sessions.length / plan.minicycleSize);
  const targetMesos = state.minicyclesPerMeso || 5;
  if (minicyclesDone > 0 && minicyclesDone % targetMesos === 0 && !state._mesoPromptShown) {
    state._mesoPromptShown = true;
    save();
    setTimeout(function() {
      openModal('<div style="padding:16px;">' +
        '<div style="font-size:24px;text-align:center;margin-bottom:8px;">🏆</div>' +
        '<div style="font-size:17px;font-weight:700;text-align:center;margin-bottom:8px;">Mesocycle Complete!</div>' +
        '<div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;">You have completed ' + targetMesos + ' minicycles. Time to plan your next mesocycle.</div>' +
        '<div style="display:flex;flex-direction:column;gap:10px;">' +
        '<button class="btn btn-primary btn-full" onclick="closeModal();state.currentMesocycle++;state._mesoPromptShown=false;save();showNewPlanModal()">Start New Mesocycle + New Plan</button>' +
        '<button class="btn btn-secondary btn-full" onclick="closeModal();state.currentMesocycle++;state._mesoPromptShown=false;save();renderHome()">Keep Current Plan</button>' +
        '</div></div>');
    }, 1500);
  }
}

  function exportBackup() {
    try {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('tl_')) {
          data[key] = localStorage.getItem(key);
        }
      }
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date();
      const ds = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
      a.href = url; a.download = 'trainlog-backup-'+ds+'.json'; a.click();
      URL.revokeObjectURL(url);
      showToast('Backup downloaded!');
    } catch(e) { showToast('Export failed: '+e.message); }
  }
  function importBackup(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        let count = 0;
        for (const key of Object.keys(data)) {
          if (key.startsWith('tl_')) { localStorage.setItem(key, data[key]); count++; }
        }
        showToast('Restored '+count+' records! Reloading...');
        setTimeout(() => location.reload(), 1800);
      } catch(err) { showToast('Restore failed: '+err.message); }
    };
    reader.readAsText(file);
  }

</script>
